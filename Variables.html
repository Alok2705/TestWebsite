<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Variables Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===========================
   CSS Variables
=========================== */

:root{

    --primary-color:#ff9800;
    --secondary-color:#2196f3;
    --text-color:white;
    --bg-color:#f2f2f2;

    --font-size:22px;
    --border-radius:10px;
    --padding:20px;

}

body{

    font-family:Arial, sans-serif;

    background:var(--bg-color);

    padding:40px;

}

/* Heading */

h1{

    text-align:center;

    margin-bottom:30px;

    color:var(--secondary-color);

}

/* Container */

.container{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

}

/* Card */

.card{

    width:250px;

    background:var(--primary-color);

    color:var(--text-color);

    padding:var(--padding);

    border-radius:var(--border-radius);

    text-align:center;

    transition:0.5s;

}

.card:hover{

    background:var(--secondary-color);

    transform:scale(1.05);

}

button{

    margin-top:20px;

    padding:10px 20px;

    background:white;

    color:black;

    border:none;

    border-radius:var(--border-radius);

    cursor:pointer;

    font-size:16px;

}

button:hover{

    background:black;

    color:white;

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


<h1>CSS Variables Example</h1>

<div class="container">

<div class="card">

<h2>HTML</h2>

<p>Learn HTML easily using CSS Variables.</p>

<button>Read More</button>

</div>

<div class="card">

<h2>CSS</h2>

<p>Variables make CSS reusable and easy to maintain.</p>

<button>Read More</button>

</div>

<div class="card">

<h2>JavaScript</h2>

<p>Combine Variables with JavaScript for dynamic themes.</p>

<button>Read More</button>

</div>

</div>

</body>
</html>
