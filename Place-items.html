<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid place-items Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{

    display:grid;

    grid-template-columns:repeat(3,1fr);
    grid-template-rows:150px 150px;

    gap:20px;

    border:3px solid black;
    padding:20px;
    background:white;

    /* Change this value */
    place-items:center;
}

.item{

    width:120px;
    height:70px;

    background:orange;
    border:2px solid black;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:25px;
    font-weight:bold;
}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


     <h1>CSS Grid place-items</h1>

     <div class="container">

        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>

    </div>

</body>
</html>
