<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid justify-content Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{

    width:900px;
    height:400px;

    border:3px solid black;
    background:white;
    margin:auto;

    display:grid;

    /* Grid is smaller than the container */
    grid-template-columns:150px 150px 150px;
    grid-template-rows:100px 100px;

    gap:20px;

    /* Change this value */
    justify-content:center;
}

.item{

    background:orange;
    border:2px solid black;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:24px;
    font-weight:bold;

}

</style>
</head>
<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


     <h1>CSS Grid justify-content</h1>

     <div class="container">

         <div class="item">1</div>
         <div class="item">2</div>
         <div class="item">3</div>
         <div class="item">4</div>
         <div class="item">5</div>
         <div class="item">6</div>

    </div>

</body>
</html>
