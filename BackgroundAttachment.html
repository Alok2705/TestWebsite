<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Attachment Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

/* First Section */

.section1{

    height:100vh;

    background-image:url("images/nature.jpg");

    background-size:cover;

    background-repeat:no-repeat;

    background-position:center;

    /* Change this value */

    background-attachment:fixed;

    display:flex;

    justify-content:center;

    align-items:center;

    color:white;

    font-size:50px;

    font-weight:bold;

}

/* Second Section */

.section2{

    height:100vh;

    background:#f2f2f2;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:35px;

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


    <div class="section1">

         Background Attachment

    </div>

    <div class="section2">

         Scroll Down and Observe the Background

    </div>

</body>
</html>
