<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animation Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f2f2f2;

    font-family:Arial;

}

.box{

    width:150px;

    height:150px;

    background:orange;

    border:3px solid black;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:25px;

    font-weight:bold;

    animation:demo 4s ease infinite;

}

/* Animation */

@keyframes demo{

    0%{

        background:red;

        transform:translateX(0);

    }

    25%{

        background:blue;

        transform:translateX(200px);

    }

    50%{

        background:green;

        transform:translateY(150px);

    }

    75%{

        background:purple;

        transform:translate(-200px,150px);

    }

    100%{

        background:orange;

        transform:translate(0,0);

    }

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


     <div class="box">

       BOX

    </div>

</body>
</html>
