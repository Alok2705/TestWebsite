<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Column Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:30px;
}

.container{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;

    background:white;
    padding:20px;
    border:3px solid black;

}

.item{

    background:orange;
    border:2px solid black;
    text-align:center;
    padding:40px;
    font-size:25px;
    font-weight:bold;

}

/* Grid Column Positioning */

.item1{
    grid-column:1/3;
    background:red;
    color:white;
}

.item2{
    grid-column:3/5;
    background:green;
    color:white;
}

.item5{
    grid-column:2/4;
    background:blue;
    color:white;
}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


    <h1>Grid Column Positioning</h1>

    <div class="container">

       <div class="item item1">1</div>
       <div class="item item2">2</div>

       <div class="item">3</div>
       <div class="item">4</div>

       <div class="item item5">5</div>

       <div class="item">6</div>
       <div class="item">7</div>
       <div class="item">8</div>

    </div>

</body>
</html>
