<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: navy;
        }

        /* Box Model Example */
        .box {
            width: 300px;
            height: 150px;

            background-color: lightblue;   /* Content Background */

            padding: 20px;                 /* Space inside border */

            border: 5px solid blue;        /* Border */

            margin: 30px auto;             /* Space outside border */

            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <p>
         <a href = "./index.html">Home Page</a>
    </p>

    <h1>CSS Box Model Example</h1>

    <div class="box">
        <h3>Box Model</h3>
        <p>
            This box contains Content, Padding,
            Border, and Margin.
        </p>
    </div>

</body>
</html>
