<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Properties</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: navy;
        }

        /* Color Name */
        .color-name {
            color: red;
        }

        /* HEX Color */
        .hex {
            color: #008000;
        }

        /* RGB Color */
        .rgb {
            color: rgb(0, 0, 255);
        }

        /* RGBA Color */
        .rgba {
            color: rgba(255, 0, 0, 0.6);
        }

        /* HSL Color */
        .hsl {
            color: hsl(120, 100%, 35%);
        }

        /* HSLA Color */
        .hsla {
            color: hsla(280, 100%, 50%, 0.7);
        }

        /* Background Color */
        .background {
            background-color: lightyellow;
            padding: 10px;
            border: 1px solid gray;
        }

        /* Border Color */
        .border {
            border: 3px solid blue;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>

    <h1>CSS Color Properties</h1>

    <p class="color-name">This text uses a Color Name.</p>

    <p class="hex">This text uses a HEX color.</p>

    <p class="rgb">This text uses an RGB color.</p>

    <p class="rgba">This text uses an RGBA color.</p>

    <p class="hsl">This text uses an HSL color.</p>

    <p class="hsla">This text uses an HSLA color.</p>

    <div class="background">
        This div uses the background-color property.
    </div>

    <div class="border">
        This div uses the border color property.
    </div>

</body>
</html>
