<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transition Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.box{

    width:200px;
    height:200px;

    background:orange;

    border:3px solid black;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:25px;
    font-weight:bold;

    cursor:pointer;

    /* Transition */
    transition:1s;

}

.box:hover{

    background:red;

    color:white;

    border-radius:50%;

    transform:rotate(360deg) scale(1.2);

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


     <div class="box">

        Hover Me

    </div>

</body>
</html>
