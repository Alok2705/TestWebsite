<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font Family Example</title>

    <style>
        body {
            background-color: #f4f4f4;
            padding: 20px;
        }

        /* Arial Font */
        .arial {
            font-family: Arial, sans-serif;
        }

        /* Times New Roman Font */
        .times {
            font-family: "Times New Roman", serif;
        }

        /* Courier New Font */
        .courier {
            font-family: "Courier New", monospace;
        }

        /* Georgia Font */
        .georgia {
            font-family: Georgia, serif;
        }

        /* Verdana Font */
        .verdana {
            font-family: Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <p>
         <a href = "./index.html">Home Page</a>
    </p>


    <h1>CSS Font Family Example</h1>

    <p class="arial">
        This text uses the Arial font.
    </p>

    <p class="times">
        This text uses the Times New Roman font.
    </p>

    <p class="courier">
        This text uses the Courier New font.
    </p>

    <p class="georgia">
        This text uses the Georgia font.
    </p>

    <p class="verdana">
        This text uses the Verdana font.
    </p>

</body>
</html>
