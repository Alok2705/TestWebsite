<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.container{

    display:grid;

    height:100vh;

    grid-template-columns:200px 1fr;
    grid-template-rows:80px 1fr 70px;

    grid-template-areas:

    "header header"
    "sidebar main"
    "footer footer";

}

.header{

    grid-area:header;
    background:red;
    color:white;
    text-align:center;
    line-height:80px;

}

.sidebar{

    grid-area:sidebar;
    background:green;
    color:white;
    text-align:center;
    line-height:400px;

}

.main{

    grid-area:main;
    background:orange;
    text-align:center;
    line-height:400px;

}

.footer{

    grid-area:footer;
    background:black;
    color:white;
    text-align:center;
    line-height:70px;

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


    <div class="container">

        <div class="header">HEADER</div>

        <div class="sidebar">SIDEBAR</div>

        <div class="main">MAIN CONTENT</div>

        <div class="footer">FOOTER</div>

    </div>

</body>
</html>
