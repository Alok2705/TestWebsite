<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid place-self Example</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{

    display:grid;

    grid-template-columns:repeat(3,1fr);
    grid-template-rows:150px 150px;

    gap:20px;

    border:3px solid black;
    background:white;
    padding:20px;

}

.item{

    width:100px;
    height:70px;

    background:orange;
    border:2px solid black;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:25px;
    font-weight:bold;

}

/* Only Item 2 */

.item2{

    place-self:center;

    /* Try these values */

    /* place-self:start; */

    /* place-self:end; */

    /* place-self:start end; */

    /* place-self:end start; */

    /* place-self:stretch; */

    background:red;
    color:white;

}

</style>

</head>

<body>
     <p>
         <a href = "./index.html">Home Page</a>
    </p>


    <h1>CSS Grid place-self Example</h1>

    <div class="container">

       <div class="item">1</div>
       <div class="item item2">2</div>
       <div class="item">3</div>

       <div class="item">4</div>
       <div class="item">5</div>
       <div class="item">6</div>

    </div>

</body>
</html>
