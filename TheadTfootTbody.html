<!DOCTYPE html>
<html>
    <head>
        <title> Table, Row and Data </title>
    </head>
    <body>
        <p>
            <a href = "./index.html">Home Page</a>
        </p>
        <h2> Tech - Student learning Tracker </h2>
        <p> We help students become job-ready 
            software engineers!
        </p>
        <table border = "1" width="100%">
            <caption><strong>Tech web development batch tracker</strong></caption>
            <colgroup>
              <col span="1"
              style = "background-color: antiquewhite;">
              <col span = "1"
              style = "background-color: aquamarine;">
            </colgroup>
            <thead>
            <tr>
                <th>Student name</th>
                <th>Current topic</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Ravi</td>
                <td>HTML</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>CSS</td>
            </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan = "2">More students are 
                        Joining Tech to learn and grow!
                    </td>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
