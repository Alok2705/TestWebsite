<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress and Range Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .container {
            width: 400px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            margin-bottom: 15px;
        }

        progress {
            width: 100%;
            height: 25px;
        }

        .value {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <p>
            <a href = "./index.html">Home Page</a>
    </p>

    <div class="container">
        <label for="progressRange">Task Completion</label>

        <input
            type="range"
            id="progressRange"
            min="0"
            max="100"
            value="50"
            oninput="
                progressBar.value=this.value;
                progressValue.textContent=this.value + '%';
            ">

        <progress id="progressBar" value="50" max="100"></progress>

        <div class="value">
            Progress: <span id="progressValue">50%</span>
        </div>
    </div>

</body>
</html>
