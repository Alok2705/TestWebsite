<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details and Summary Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        details {
            width: 500px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        summary {
            font-weight: bold;
            cursor: pointer;
        }

        p {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <p>
            <a href = "./index.html">Home Page</a>
    </p>

    <details>
        <summary>Read More About HTML</summary>

        <p>
            HTML (HyperText Markup Language) is the standard markup language
            used to create web pages. It provides the structure of a webpage
            using various elements and tags.
        </p>
    </details>

</body>
</html>
